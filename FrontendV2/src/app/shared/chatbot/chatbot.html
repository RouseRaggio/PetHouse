<!-- Botón flotante -->
<button class="chat-btn" (click)="toggleChat()" title="Chatbot PetHouse IA">
  <span class="chat-btn-badge">1</span>
  <span class="chat-btn-icon">💬</span>
  <span class="chat-btn-label">¿Necesitas ayuda? 🐾</span>
</button>

<!-- Ventana del chat -->
<div class="chat-window" *ngIf="abierto">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-avatar">🐶</div>
    <div class="header-info">
      <div class="header-name">PetHouse IA</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span class="status-label">En línea</span>
      </div>
    </div>
    <button class="header-close" (click)="toggleChat()" title="Cerrar">✕</button>
  </div>

  <!-- Mensajes -->
  <div class="messages">
    <div
      *ngFor="let msg of mensajes"
      class="msg"
      [class.usuario]="msg.tipo === 'usuario'"
      [class.bot]="msg.tipo === 'bot'"
    >
      {{ msg.texto }}
    </div>
  </div>

  <!-- Footer / Input -->
  <div class="chat-footer">
    <textarea
      class="chat-input"
      [(ngModel)]="mensaje"
      (keyup.enter)="enviar()"
      [placeholder]="esperando ? 'Espera la respuesta...' : 'Escribe tu mensaje...'"
      [disabled]="esperando"
      rows="1"
    >
    </textarea>
    <button class="send-btn" (click)="enviar()" [disabled]="esperando" title="Enviar">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>
  </div>
</div>
