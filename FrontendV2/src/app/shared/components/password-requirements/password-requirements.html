<p>password-requirements works!</p>
<div class="password-requirements mt-2">
  <small class="d-block text-muted mb-2">
    <strong>Requisitos de contraseña:</strong>
  </small>

  <div *ngFor="let req of requirementList" class="requirement-item">
    <i
      class="bi"
      [class.bi-check-circle-fill]="req.met"
      [class.bi-circle]="!req.met"
      [class.text-success]="req.met"
      [class.text-muted]="!req.met"
    ></i>
    <span [class.text-success]="req.met" [class.text-muted]="!req.met">
      {{ req.text }}
    </span>
  </div>

  <div
    *ngIf="password && !allRequirementsMet"
    class="alert alert-warning mt-2 py-1 px-2"
    role="alert"
  >
    <small>Completa todos los requisitos para crear la contraseña</small>
  </div>

  <div
    *ngIf="password && allRequirementsMet"
    class="alert alert-success mt-2 py-1 px-2"
    role="alert"
  >
    <small>✓ Contraseña válida</small>
  </div>
</div>
