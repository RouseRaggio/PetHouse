<nav
  class="navbar navbar-expand-lg"
  [class.navbar-scrolled]="scrolled"
  [class.navbar-top]="!scrolled"
  [class.login-navbar]="variant === 'login'"
>
  <div class="container-fluid px-lg-5">
    <!-- Brand / Logo -->
    <a class="navbar-brand brand-logo" routerLink="/">
      <span class="logo-badge" aria-label="PetHouse logo">
        <span class="logo-icon">🏡</span>
      </span>
      <span class="logo-text">PetHouse</span>
    </a>

    <!-- Hamburger toggler -->
    <button
      class="navbar-toggler cartoon-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-label="Abrir menú de navegación"
    >
      <span class="toggler-bar"></span>
      <span class="toggler-bar"></span>
      <span class="toggler-bar"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center me-0">
        <li class="nav-item">
          <a class="nav-link nav-custom px-3" routerLink="/">
            <span class="nav-emoji">🏡</span> Inicio
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-custom px-3" routerLink="/mascotas">
            <span class="nav-emoji">🐾</span> Mascotas
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-custom px-3" routerLink="/veterinario">
            <span class="nav-emoji">🩺</span> Veterinario
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-custom px-3" routerLink="/publicar">
            <span class="nav-emoji">📝</span> Publicar
          </a>
        </li>

        <!-- User menu -->
        <li class="nav-item user-menu-item ms-lg-3 mt-3 mt-lg-0 pe-0">
          <ng-container *ngIf="user; else loginBlock">
            <div class="dropdown">
              <button
                class="btn profile-trigger d-flex align-items-center gap-2"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <div class="avatar-circle">{{ getInitial() }}</div>
                <span class="user-name-label d-none d-xl-inline">{{ user.name }}</span>
                <i class="bi bi-chevron-down small opacity-50"></i>
              </button>

              <ul class="dropdown-menu dropdown-menu-end cartoon-dropdown p-2 mt-2">
                <!-- User info header -->
                <li class="px-3 py-2 border-bottom mb-2 user-info-header">
                  <div class="fw-bold">{{ user.name }} {{ user.last_name || '' }}</div>
                  <div class="text-muted small">{{ user.email }}</div>
                </li>

                <!-- Admin panel link -->
                <li *ngIf="isAdmin()">
                  <a class="dropdown-item cartoon-dropdown-item py-2" routerLink="/admin">
                    <i class="bi bi-speedometer2 me-2"></i> Panel Admin
                  </a>
                </li>

                <!-- Telegram Linking -->
                <li>
                  <a
                    *ngIf="!hasTelegramLinked()"
                    class="dropdown-item cartoon-dropdown-item py-2 text-primary"
                    [href]="getTelegramBotLink()"
                    target="_blank"
                    rel="noopener"
                  >
                    <i class="bi bi-telegram me-2"></i> Vincular Telegram
                  </a>
                  <span
                    *ngIf="hasTelegramLinked()"
                    class="dropdown-item cartoon-dropdown-item py-2 text-success"
                    style="cursor: default; pointer-events: none;"
                  >
                    <i class="bi bi-check-circle-fill me-2"></i> Telegram Activo
                  </span>
                </li>

                <!-- Logout -->
                <li>
                  <button
                    class="dropdown-item cartoon-dropdown-item py-2 text-danger"
                    (click)="logout()"
                  >
                    <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                  </button>
                </li>
              </ul>
            </div>
          </ng-container>

          <!-- Login button fallback -->
          <ng-template #loginBlock>
            <a *ngIf="showLogin" routerLink="/login" class="btn btn-login-cartoon px-4">
              ¡Entrar! 🐶
            </a>
          </ng-template>
        </li>
      </ul>
    </div>
  </div>
</nav>
