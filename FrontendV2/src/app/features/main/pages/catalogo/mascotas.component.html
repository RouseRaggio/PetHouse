<app-navbar />

<main class="catalog-page pb-5">
  <!-- Hero Banner -->
  <section class="catalog-hero py-5 mb-5 text-center text-white position-relative overflow-hidden">
    <div class="hero-overlay"></div>
    <div class="container position-relative z-1 py-4">
      <h1 class="display-4 fw-bold mb-3">
        Encuentra a tu Nuevo <span class="text-warning">Mejor Amigo</span>
      </h1>
      <p class="lead mb-0 opacity-90 mx-auto" style="max-width: 600px">
        Explora cientos de mascotas que buscan un hogar lleno de amor. Cada adopción cambia una vida
        para siempre.
      </p>
    </div>
  </section>

  <div class="container">
    <!-- Search & Filter -->
    <div class="row justify-content-center mb-5">
      <div class="col-lg-10">
        <div class="filter-card p-4">
          <div class="row g-3 align-items-center">
            <div class="col-md-6">
              <div class="search-input-wrapper position-relative">
                <i
                  class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"
                ></i>
                <input
                  type="search"
                  class="form-control form-control-lg ps-5 rounded-pill border-light bg-light cartoon-input"
                  placeholder="Buscar por nombre o raza..."
                  [(ngModel)]="search"
                />
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex flex-wrap gap-2 justify-content-md-end align-items-center">
                <button
                  class="filter-btn"
                  [class.active]="filterType === 'all'"
                  (click)="setFilter('all')"
                >
                  Todos
                </button>
                <button
                  class="filter-btn"
                  [class.active]="filterType === 'perro'"
                  (click)="setFilter('perro')"
                >
                  <i class="bi bi-house-heart me-1"></i> Perros
                </button>
                <button
                  class="filter-btn"
                  [class.active]="filterType === 'gato'"
                  (click)="setFilter('gato')"
                >
                  <i class="bi bi-heart me-1"></i> Gatos
                </button>
                <button
                  class="filter-btn"
                  [class.active]="filterType === 'otro'"
                  (click)="setFilter('otro')"
                >
                  Otros
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary fs-2" role="status"></div>
      <p class="mt-3 text-muted">Buscando compañeros para ti...</p>
    </div>

    <!-- Grid -->
    <div *ngIf="!loading && filteredPets.length > 0" class="row g-4 g-lg-5">
      <div *ngFor="let pet of filteredPets" class="col-sm-6 col-md-4 col-xl-3">
        <app-pet-card [pet]="pet" (view)="openModal(pet)" />
      </div>
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && filteredPets.length === 0" class="text-center py-5">
      <div class="mb-4">
        <i class="bi bi-search-heart display-1 text-muted opacity-50"></i>
      </div>
      <h3 class="fw-bold text-dark">No encontramos resultados</h3>
      <p class="text-muted">Prueba buscando con otras palabras o filtros.</p>
      <button class="btn btn-outline-primary rounded-pill px-4 mt-2" (click)="resetFilters()">
        Ver todos de nuevo
      </button>
    </div>

    <!-- Modal -->
    <app-pet-modal *ngIf="selectedPet" [selectedPet]="selectedPet" (closeModal)="closeModal()" />
  </div>
</main>
